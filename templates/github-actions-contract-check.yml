name: service-ci

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Deployment environment for manual CD.
        required: false
        type: choice
        options:
          - none
          - dev
          - prod
        default: none

permissions:
  contents: read
  packages: read
  id-token: write

env:
  CONTRACT_REPO: https://github.com/jho951/service-contract
  SERVICE_NAME: auth-service
  CI_PROFILE: spring-boot
  CD_PROFILE: ec2-compose
  COMPOSE_VALIDATE_SCRIPT: ./scripts/validate-compose.sh
  DEPLOY_WRAPPER_SCRIPT: ./scripts/deploy-stack-service.sh
  JAVA_VERSION: "17"
  NODE_VERSION: "20"
  TEST_COMMAND: ./gradlew clean test
  BUILD_COMMAND: ./gradlew bootJar
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  DOCKER_IMAGE_REPOSITORY: ${{ vars.ECR_REPOSITORY_NAME || format('{0}-auth-service', github.ref_type == 'tag' && 'prod' || 'dev') }}
  HEALTH_URL: http://127.0.0.1:8081/health
  READY_URL: http://127.0.0.1:8081/ready

jobs:
  contract-lock:
    name: Contract Lock
    runs-on: ubuntu-latest
    outputs:
      service_name: ${{ steps.lock.outputs.service_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate contract lock
        id: lock
        shell: bash
        run: |
          set -euo pipefail
          test -f contract.lock.yml
          grep -q "repo: ${CONTRACT_REPO}" contract.lock.yml
          grep -q "name: ${SERVICE_NAME}" contract.lock.yml
          grep -q "ref:" contract.lock.yml
          grep -q "commit:" contract.lock.yml
          grep -q "consumes:" contract.lock.yml
          echo "service_name=${SERVICE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Fetch contract source
        shell: bash
        run: |
          bash ./scripts/fetch-contract.sh

      - name: Verify consumed contract paths
        shell: bash
        run: |
          set -euo pipefail
          awk '
            /^[^[:space:]]/ { in_consumes = 0 }
            /^[[:space:]]+consumes:/ { in_consumes = 1; next }
            in_consumes && /^[[:space:]]+-[[:space:]]+/ {
              sub(/^[[:space:]]+-[[:space:]]+/, "")
              print
            }
          ' contract.lock.yml | while read -r path; do
            case "$path" in
              *"*"*) compgen -G ".contract/$path" > /dev/null ;;
              *) test -e ".contract/$path" ;;
            esac
          done

  test-build:
    name: Test And Build
    runs-on: ubuntu-latest
    needs: contract-lock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch contract source
        if: ${{ env.CD_PROFILE == 'ec2-compose' }}
        shell: bash
        run: |
          bash ./scripts/fetch-contract.sh

      - name: Ensure wrapper scripts are executable
        if: ${{ env.CD_PROFILE == 'ec2-compose' }}
        run: chmod +x "${COMPOSE_VALIDATE_SCRIPT}" "${DEPLOY_WRAPPER_SCRIPT}"

      - name: Validate dev compose
        if: ${{ env.CD_PROFILE == 'ec2-compose' }}
        run: ${{ env.COMPOSE_VALIDATE_SCRIPT }} dev

      - name: Validate prod compose
        if: ${{ env.CD_PROFILE == 'ec2-compose' }}
        run: ${{ env.COMPOSE_VALIDATE_SCRIPT }} prod

      - name: Setup Java
        if: ${{ env.CI_PROFILE == 'spring-boot' || env.CI_PROFILE == 'module' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Node
        if: ${{ env.CI_PROFILE == 'frontend' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install frontend dependencies
        if: ${{ env.CI_PROFILE == 'frontend' }}
        run: npm ci

      - name: Test
        run: ${{ env.TEST_COMMAND }}

      - name: Build
        run: ${{ env.BUILD_COMMAND }}

  docker-image:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: test-build
    if: ${{ github.event_name != 'pull_request' && env.CI_PROFILE != 'module' }}
    outputs:
      image_uri: ${{ steps.image-meta.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image URI
        id: image-meta
        run: echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${{ env.DOCKER_IMAGE_REPOSITORY }}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build image
        env:
          DOCKER_IMAGE: ${{ steps.image-meta.outputs.image_uri }}
        run: docker build -t "${DOCKER_IMAGE}" .

      - name: Push image
        env:
          DOCKER_IMAGE: ${{ steps.image-meta.outputs.image_uri }}
        run: docker push "${DOCKER_IMAGE}"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker-image
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_environment != 'none' }}
    environment: ${{ inputs.deploy_environment }}
    steps:
      - name: Deployment gate
        run: |
          echo "Deploy profile: ${CD_PROFILE}"
          echo "Target environment: ${{ inputs.deploy_environment }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch contract source
        if: ${{ env.CD_PROFILE == 'ec2-compose' }}
        shell: bash
        run: |
          bash ./scripts/fetch-contract.sh

      - name: Ensure deploy wrapper is executable
        if: ${{ env.CD_PROFILE == 'ec2-compose' }}
        run: chmod +x "${DEPLOY_WRAPPER_SCRIPT}"

      - name: Deploy via /opt/deploy wrapper
        if: ${{ env.CD_PROFILE == 'ec2-compose' }}
        env:
          AUTH_SERVICE_IMAGE: ${{ needs.docker-image.outputs.image_uri }}
        run: ${{ env.DEPLOY_WRAPPER_SCRIPT }} "${{ inputs.deploy_environment }}"

      - name: Deploy placeholder
        if: ${{ env.CD_PROFILE != 'ec2-compose' }}
        run: |
          echo "Implement the repository-specific deploy wrapper here."

      - name: Smoke check
        run: |
          curl --fail --retry 12 --retry-delay 5 "${HEALTH_URL}"
          curl --fail --retry 12 --retry-delay 5 "${READY_URL}"
